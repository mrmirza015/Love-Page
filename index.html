<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Try To Say No?</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0010;
    }

    #page1, #page2 {
      position: relative;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #page1 { background: linear-gradient(135deg, #1a0010 0%, #3d0020 40%, #1a000d 100%); }
    #page2 { background: linear-gradient(135deg, #0d001a 0%, #3d0030 40%, #1a000d 100%); display: none; }

    .bg-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative; z-index: 10;
      text-align: center;
      padding: 2rem;
    }

    .question {
      font-family: 'Dancing Script', cursive;
      font-size: 4rem;
      color: #ff9aba;
      text-shadow: 0 0 20px #ff4488, 0 0 40px #ff1166;
      margin-bottom: 3rem;
      line-height: 1.2;
    }

    .btn-container {
      display: flex;
      gap: 2rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      min-height: 100px;
      position: relative;
    }

    .btn-yes {
      font-family: 'Dancing Script', cursive;
      font-size: 1.8rem;
      padding: 16px 48px;
      background: linear-gradient(135deg, #e8005a, #ff4488);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 20px #ff448844;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-yes:hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px #ff4488aa;
    }

    .btn-no {
      font-family: 'Dancing Script', cursive;
      font-size: 1.6rem;
      padding: 14px 40px;
      background: transparent;
      color: #cc7799;
      border: 2px solid #cc4477;
      border-radius: 50px;
      cursor: pointer;
      position: relative;
      transition: left 0.05s, top 0.05s;
      user-select: none;
    }

    .love-msg {
      font-family: 'Dancing Script', cursive;
      font-size: 4.5rem;
      color: #ffaacc;
      text-shadow: 0 0 30px #ff4488, 0 0 60px #ff0066;
      line-height: 1.3;
    }

    .love-sub {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 1.2rem;
      color: #ff99bb;
      margin-top: 1.2rem;
      letter-spacing: 3px;
    }

    .heart-big {
      font-size: 5rem;
      display: block;
      margin-bottom: 1.2rem;
      animation: heartbeat 1s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }
  </style>
</head>
<body>

  <!-- Page 1 -->
  <div id="page1">
    <canvas class="bg-canvas" id="canvas1"></canvas>
    <div class="content">
      <div class="question">Do You Love Me? 💖</div>
      <div class="btn-container" id="btnContainer">
        <button class="btn-yes" onclick="handleYes()">Yes 💕</button>
        <button class="btn-no" id="btnNo" onmouseenter="runAway()" ontouchstart="runAway()">No</button>
      </div>
    </div>
  </div>

  <!-- Page 2 -->
  <div id="page2">
    <canvas class="bg-canvas" id="canvas2"></canvas>
    <div class="content">
      <span class="heart-big">💗</span>
      <div class="love-msg">I Love You More</div>
      <div class="love-sub">forever &amp; always ✨</div>
    </div>
  </div>

  <script>
    function handleYes() {
      document.getElementById('page1').style.display = 'none';
      document.getElementById('page2').style.display = 'flex';
      startPage2();
    }

    const btnNo = document.getElementById('btnNo');
    const container = document.getElementById('btnContainer');
    let noSize = 1.6;
    let escaped = false;

    function teleportAway() {
      const W = window.innerWidth;
      const H = window.innerHeight;
      const btnW = btnNo.offsetWidth || 100;
      const btnH = btnNo.offsetHeight || 50;

      // Pick a random spot anywhere on screen, away from cursor
      const margin = 20;
      const x = margin + Math.random() * (W - btnW - margin * 2);
      const y = margin + Math.random() * (H - btnH - margin * 2);

      btnNo.style.position = 'fixed';
      btnNo.style.left = x + 'px';
      btnNo.style.top = y + 'px';
      btnNo.style.zIndex = '9999';
    }

    function runAway() {
      if (!escaped) {
        escaped = true;
        btnNo.style.position = 'fixed';
        btnNo.style.zIndex = '9999';
      }
      teleportAway();
    }

    // Track mouse globally — if mouse gets within 80px of the No button, flee immediately
    document.addEventListener('mousemove', function(e) {
      if (!escaped) return;
      const rect = btnNo.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
      if (dist < 100) {
        teleportAway();
      }
    });

    // Completely block any click on No
    btnNo.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      teleportAway();
    });

    function startParticles(canvasId, isPage2) {
      const canvas = document.getElementById(canvasId);
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const particles = [];
      const count = isPage2 ? 70 : 50;

      for (let i = 0; i < count; i++) {
        particles.push(newParticle(W, H, true, isPage2));
      }

      function newParticle(W, H, init, isP2) {
        const types = isP2
          ? ['heart', 'heart', 'heart', 'flower', 'star']
          : ['heart', 'flower', 'petal'];
        return {
          x: Math.random() * W,
          y: init ? Math.random() * H : H + 20,
          size: Math.random() * 20 + 8,
          speed: Math.random() * 0.9 + 0.3,
          drift: (Math.random() - 0.5) * 0.6,
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.04,
          alpha: Math.random() * 0.6 + 0.2,
          type: types[Math.floor(Math.random() * types.length)],
          hue: isP2 ? Math.random() * 60 + 300 : Math.random() * 40 + 330
        };
      }

      function drawHeart(ctx, x, y, size, color) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.beginPath();
        const s = size * 0.5;
        ctx.moveTo(x, y + s * 0.35);
        ctx.bezierCurveTo(x, y, x - s, y, x - s, y + s * 0.35);
        ctx.bezierCurveTo(x - s, y + s * 0.7, x, y + s * 1.1, x, y + s * 1.3);
        ctx.bezierCurveTo(x, y + s * 1.1, x + s, y + s * 0.7, x + s, y + s * 0.35);
        ctx.bezierCurveTo(x + s, y, x, y, x, y + s * 0.35);
        ctx.fill();
        ctx.restore();
      }

      function drawFlower(ctx, x, y, size, color) {
        ctx.save();
        ctx.fillStyle = color;
        const petals = 5;
        for (let p = 0; p < petals; p++) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate((p / petals) * Math.PI * 2);
          ctx.beginPath();
          ctx.ellipse(0, -size * 0.4, size * 0.22, size * 0.48, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        ctx.fillStyle = '#ffe066';
        ctx.beginPath();
        ctx.arc(x, y, size * 0.22, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawPetal(ctx, x, y, size, rot, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(0, 0, size * 0.3, size * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function loop() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach((p, i) => {
          ctx.save();
          ctx.globalAlpha = p.alpha;
          const color = `hsl(${p.hue}, 90%, 70%)`;

          if (p.type === 'heart') {
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            drawHeart(ctx, 0, -p.size * 0.5, p.size, color);
          } else if (p.type === 'flower') {
            drawFlower(ctx, p.x, p.y, p.size * 0.9, color);
          } else if (p.type === 'petal') {
            drawPetal(ctx, p.x, p.y, p.size, p.rot, color);
          } else if (p.type === 'star') {
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = color;
            ctx.font = p.size + 'px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('✦', 0, 0);
          }

          ctx.restore();

          p.y -= p.speed;
          p.x += p.drift;
          p.rot += p.rotSpeed;

          if (p.y < -p.size * 2) {
            particles[i] = newParticle(W, H, false, isPage2);
          }
        });

        requestAnimationFrame(loop);
      }
      loop();
    }

    startParticles('canvas1', false);

    function startPage2() {
      setTimeout(() => startParticles('canvas2', true), 50);
    }

    window.addEventListener('resize', () => {
      const c1 = document.getElementById('canvas1');
      const c2 = document.getElementById('canvas2');
      c1.width = window.innerWidth;
      c1.height = window.innerHeight;
      c2.width = window.innerWidth;
      c2.height = window.innerHeight;
    });
  </script>

</body>
</html>
